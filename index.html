<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <title>⚽ Jorge Antonio cumple 10 años</title>

  <meta name="description"
    content="Acompáñanos a celebrar los 10 años de Jorge Antonio con una divertida reta de fútbol.">

  <!-- Open Graph (WhatsApp, Facebook, LinkedIn, etc.) -->

  <meta property="og:type" content="website">

  <meta property="og:title" content="⚽ Jorge Antonio cumple 10 años 🎉">

  <meta property="og:description"
    content="📅 Miércoles 22 de julio | 🕕 6:00 p. m. | 📍 Parque de San Juanistas. ¡Habrá reta de fútbol!">

  <meta property="og:image" content="https://lauraac.github.io/messi/img/previ1.jpg">

  <meta property="og:url" content="https://lauraac.github.io/messi/">

  <meta property="og:locale" content="es_MX">

  <meta property="og:site_name" content="Invitación Jorge Antonio">

  <!-- Twitter / X -->

  <meta name="twitter:card" content="summary_large_image">

  <meta name="twitter:title" content="⚽ Jorge Antonio cumple 10 años 🎉">

  <meta name="twitter:description" content="¡Te esperamos para celebrar con una reta de fútbol!">

  <meta name="twitter:image" content="https://lauraac.github.io/messi/img/previ1.jpg">

  <link rel="stylesheet" href="style.css">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

  <!-- Confeti -->
  <div id="particles" aria-hidden="true"></div>

  <!-- Balón animado -->
  <div class="ball" aria-hidden="true"></div>

  <main class="invitation-page">

    <section class="card">

      <!-- Messi sobresale de la tarjeta -->
      <img src="img/messi.png" class="lego" alt="Figura de futbolista con camiseta número 10">

      <!-- Imagen con los datos -->
      <img src="img/informacion.png" class="info-img" alt="Información del cumpleaños de Jorge Antonio">

      <!-- Botón funcional -->
      <a class="boton" href="https://www.google.com/maps/search/?api=1&query=Parque+de+San+Juanistas+Colonia+Campestre"
        target="_blank" rel="noopener noreferrer">
        <span class="location-icon">📍</span>

        <span class="location-text">
          <strong>Ver ubicación</strong>
          <small>Abrir en Google Maps</small>
        </span>
      </a>

    </section>

    <!-- Pie de página -->
    <!-- Pie de página -->
    <footer class="footer-futbol">
      <img src="img/footer-futbol.png" alt="" class="footer-image">

      <div class="footer-content">

        <p class="footer-title">
          ¡Te esperamos para celebrar!
        </p>

        <div class="footer-contact">

          <span>Invitaciones LAC</span>

          <a class="whatsapp-ball" href="https://wa.me/525534633490?text=Hola%20me%20interesa%20una%20invitaci%C3%B3n"
            target="_blank" rel="noopener">

            <img src="img/balon.png" alt="WhatsApp">

          </a>

        </div>

      </div>

    </footer>

  </main>

  <!-- Música -->
  <audio id="backgroundMusic" src="img/messi.mp3" preload="auto" loop></audio>

  <button id="musicButton" class="music-button" type="button" aria-label="Pausar música" aria-pressed="true">
    <span class="music-icon">
      <img id="musicBallIcon" src="img/balon.png" alt="">

      <span id="musicStatusIcon" class="music-status-icon">
        Ⅱ
      </span>
    </span>

    <span id="musicLabel" class="music-label">
      Pausar
    </span>
  </button>

  <script src="script.js"></script>

</body>

</html>
